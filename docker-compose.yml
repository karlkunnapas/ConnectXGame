services:
  web:
    container_name: connectx-web
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Data Source=<db_file>;Cache=Shared"
    volumes:
      - connectx-data:/root/ConnectX

volumes:
  connectx-data:
